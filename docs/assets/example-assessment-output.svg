<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F0F2F5"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="62%" stop-color="#2E75B6"/>
      <stop offset="100%" stop-color="#4A90D9"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" rx="12" fill="url(#bgA)"/>
  <text x="450" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1A1A2E">Example: PE Workforce Due Diligence Assessment Output</text>
  <text x="450" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#888">Illustrative data — based on assessment methodology design, not a live engagement</text>
  <circle cx="140" cy="150" r="62" fill="none" stroke="#E8E8EC" stroke-width="8"/>
  <circle cx="140" cy="150" r="62" fill="none" stroke="#2E75B6" stroke-width="8" stroke-dasharray="242" stroke-dashoffset="92" stroke-linecap="round" transform="rotate(-90 140 150)"/>
  <text x="140" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#2E75B6">62</text>
  <text x="140" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#888">of 100</text>
  <text x="140" y="236" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">Workforce Readiness Score</text>
  <text x="280" y="105" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1A1A2E">Role Coverage</text>
  <text x="280" y="120" font-family="Georgia, serif" font-size="10" fill="#888">% of critical roles staffed vs. WIDAI reference</text>
  <rect x="280" y="128" width="560" height="16" rx="8" fill="#E8E8EC"/>
  <rect x="280" y="128" width="392" height="16" rx="8" fill="url(#scoreGrad)" opacity="0.85"/>
  <text x="848" y="140" text-anchor="end" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2E75B6">70%</text>
  <text x="280" y="165" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1A1A2E">KSA Depth</text>
  <text x="280" y="180" font-family="Georgia, serif" font-size="10" fill="#888">avg. KSA match per role against domain pool</text>
  <rect x="280" y="188" width="560" height="16" rx="8" fill="#E8E8EC"/>
  <rect x="280" y="188" width="291" height="16" rx="8" fill="url(#scoreGrad)" opacity="0.85"/>
  <text x="848" y="200" text-anchor="end" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2E75B6">52%</text>
  <text x="280" y="225" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1A1A2E">Regulatory Alignment</text>
  <text x="280" y="240" font-family="Georgia, serif" font-size="10" fill="#888">obligations covered by current team structure</text>
  <rect x="280" y="248" width="560" height="16" rx="8" fill="#E8E8EC"/>
  <rect x="280" y="248" width="380" height="16" rx="8" fill="url(#scoreGrad)" opacity="0.85"/>
  <text x="848" y="260" text-anchor="end" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2E75B6">68%</text>
  <text x="280" y="285" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1A1A2E">Key-Person Risk</text>
  <text x="280" y="300" font-family="Georgia, serif" font-size="10" fill="#888">single points of failure in critical functions</text>
  <rect x="280" y="308" width="560" height="16" rx="8" fill="#E8E8EC"/>
  <rect x="280" y="308" width="336" height="16" rx="8" fill="#D93F0B" opacity="0.70"/>
  <text x="848" y="320" text-anchor="end" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#D93F0B">HIGH</text>
  <line x1="60" y1="350" x2="840" y2="350" stroke="#1A1A2E" stroke-width="1" opacity="0.12"/>
  <text x="60" y="378" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">Key Finding:</text>
  <text x="155" y="378" font-family="Georgia, serif" font-size="13" fill="#555">Target has 3 data engineers covering work that reference architecture maps to 7 roles.</text>
  <text x="155" y="396" font-family="Georgia, serif" font-size="13" fill="#555">No dedicated AI governance function. ML Ops handled by one contractor with no backup.</text>
  <text x="60" y="426" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">Year 1 Investment:</text>
  <text x="195" y="426" font-family="Georgia, serif" font-size="13" fill="#555">4 hires ($680K loaded cost) close 78% of the coverage gap and eliminate key-person risk.</text>
  <text x="195" y="444" font-family="Georgia, serif" font-size="13" fill="#555">Two hires cover the most regulatory surface area if budget is limited.</text>
  <rect x="60" y="465" width="780" height="32" rx="6" fill="#2E75B6" opacity="0.06"/>
  <text x="450" y="486" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#888">Illustrative example based on WIDAI assessment methodology (ADR-011). Not derived from a live engagement.</text>
</svg>
