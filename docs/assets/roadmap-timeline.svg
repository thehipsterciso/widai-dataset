<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F0F2F5"/>
    </linearGradient>
  </defs>
  <rect width="900" height="340" rx="12" fill="url(#bg3)"/>
  <text x="450" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">From Validation to Scale</text>
  <text x="450" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#555">Each phase produces something that funds and informs the next.</text>

  <!-- Timeline line -->
  <line x1="60" y1="130" x2="840" y2="130" stroke="#1A1A2E" stroke-width="2" opacity="0.15"/>

  <!-- Phase 0 -->
  <circle cx="120" cy="130" r="16" fill="#D93F0B"/>
  <text x="120" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#fff">0</text>
  <text x="120" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#D93F0B">Weeks 1–2</text>
  <text x="120" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">Validate</text>
  <text x="120" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Test assumptions</text>
  <text x="120" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">before building.</text>
  <text x="120" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#888">4 parallel tests</text>

  <!-- Arrow -->
  <path d="M 170 130 L 210 130" stroke="#1A1A2E" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.3"/>

  <!-- Phase 1 -->
  <circle cx="280" cy="130" r="16" fill="#E99695"/>
  <text x="280" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#fff">1</text>
  <text x="280" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#E99695">Weeks 3–8</text>
  <text x="280" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">First Product</text>
  <text x="280" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">PE assessment</text>
  <text x="280" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">methodology + pilot.</text>
  <text x="280" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#888">Revenue starts here</text>

  <!-- Arrow -->
  <path d="M 330 130 L 370 130" stroke="#1A1A2E" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Phase 2 -->
  <circle cx="440" cy="130" r="16" fill="#FBCA04"/>
  <text x="440" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#1A1A2E">2</text>
  <text x="440" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#B89B00">Weeks 9–16</text>
  <text x="440" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">Compliance</text>
  <text x="440" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">EU AI Act mapping.</text>
  <text x="440" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Cross-regulatory analysis.</text>
  <text x="440" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#888">Ships before Aug 2026</text>

  <!-- Arrow -->
  <path d="M 490 130 L 530 130" stroke="#1A1A2E" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Phase 3 -->
  <circle cx="600" cy="130" r="16" fill="#0E8A16"/>
  <text x="600" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#fff">3</text>
  <text x="600" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#0E8A16">Weeks 17–24</text>
  <text x="600" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">Expand</text>
  <text x="600" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Agentic AI roles.</text>
  <text x="600" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">CDAIO toolkit.</text>
  <text x="600" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#888">Built on validated base</text>

  <!-- Arrow -->
  <path d="M 650 130 L 690 130" stroke="#1A1A2E" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Phase 4 -->
  <circle cx="760" cy="130" r="16" fill="#1D76DB"/>
  <text x="760" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#fff">4</text>
  <text x="760" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#1D76DB">Weeks 25+</text>
  <text x="760" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">Scale</text>
  <text x="760" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">API. Graph database.</text>
  <text x="760" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Full coverage.</text>
  <text x="760" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#888">Funded by Phases 1–3</text>

  <!-- Bottom principle -->
  <line x1="60" y1="270" x2="840" y2="270" stroke="#1A1A2E" stroke-width="1" opacity="0.15"/>
  <text x="450" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1A1A2E">Sequencing principle: structural dependencies, not political priority.</text>
  <text x="450" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Each phase's output determines whether the next phase proceeds, pivots, or pauses.</text>
</svg>
