  <text x="55" y="290" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">How many required roles</text>
  <text x="55" y="304" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">does the team have?</text>
  <text x="55" y="324" font-family="Georgia, serif" font-size="9" fill="#888">Role presence vs. taxonomy</text>

  <rect x="250" y="248" width="195" height="90" rx="8" fill="#fff" stroke="#2E75B6" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="250" y="248" width="195" height="24" rx="8" fill="#2E75B6" opacity="0.08"/>
  <rect x="250" y="265" width="195" height="7" rx="0" fill="#fff"/>
