  <text x="399" y="162" font-family="Georgia, serif" font-size="9" fill="#555">Risk identification</text>
  <text x="399" y="174" font-family="Georgia, serif" font-size="9" fill="#555">Key person analysis</text>

  <line x1="536" y1="145" x2="551" y2="145" stroke="#1A1A2E" stroke-width="1.5" marker-end="url(#arwD)"/>

  <rect x="556" y="110" width="152" height="70" rx="8" fill="#fff" stroke="#1A1A2E" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="556" y="110" width="152" height="22" rx="8" fill="#1A1A2E" opacity="0.06"/>
  <rect x="556" y="126" width="152" height="6" rx="0" fill="#fff"/>
  <text x="632" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#1A1A2E">Phase 4: Model</text>
  <text x="571" y="148" font-family="Georgia, serif" font-size="9" fill="#888">Days 23–27</text>
  <text x="571" y="162" font-family="Georgia, serif" font-size="9" fill="#555">Investment modeling</text>
  <text x="571" y="174" font-family="Georgia, serif" font-size="9" fill="#555">Year 1–3 projections</text>

  <line x1="708" y1="145" x2="723" y2="145" stroke="#1A1A2E" stroke-width="1.5" marker-end="url(#arwD)"/>

  <rect x="728" y="110" width="132" height="70" rx="8" fill="#1A1A2E" opacity="0.06" stroke="#1A1A2E" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="728" y="110" width="132" height="22" rx="8" fill="#1A1A2E" opacity="0.1"/>
  <rect x="728" y="126" width="132" height="6" rx="0" fill="#1A1A2E" opacity="0.06"/>
  <text x="794" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#1A1A2E">Phase 5: Deliver</text>
  <text x="743" y="148" font-family="Georgia, serif" font-size="9" fill="#888">Days 28–30</text>
  <text x="743" y="162" font-family="Georgia, serif" font-size="9" fill="#555">Executive deliverables</text>
  <text x="743" y="174" font-family="Georgia, serif" font-size="9" fill="#555">Board presentation</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SCORING MODEL -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="60" y1="202" x2="840" y2="202" stroke="#1A1A2E" stroke-width="1" opacity="0.1"/>
  <text x="60" y="232" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">Four-Dimension Scoring Model</text>
  <text x="820" y="232" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#888">ADR-011</text>

  <!-- Dimension cards -->
  <rect x="40" y="248" width="195" height="90" rx="8" fill="#fff" stroke="#2E75B6" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="40" y="248" width="195" height="24" rx="8" fill="#2E75B6" opacity="0.08"/>
