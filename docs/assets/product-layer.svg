  <text x="265" y="304" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">against the benchmark?</text>
  <text x="265" y="324" font-family="Georgia, serif" font-size="9" fill="#888">KSA depth vs. DCI target</text>

  <rect x="460" y="248" width="195" height="90" rx="8" fill="#fff" stroke="#2E75B6" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="460" y="248" width="195" height="24" rx="8" fill="#2E75B6" opacity="0.08"/>
  <rect x="460" y="265" width="195" height="7" rx="0" fill="#fff"/>
  <text x="557" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2E75B6">Criticality</text>
  <text x="475" y="290" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">Which gaps carry the</text>
  <text x="475" y="304" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">highest business risk?</text>
  <text x="475" y="324" font-family="Georgia, serif" font-size="9" fill="#888">Risk-weighted gap scoring</text>

  <rect x="670" y="248" width="190" height="90" rx="8" fill="#fff" stroke="#2E75B6" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="670" y="248" width="190" height="24" rx="8" fill="#2E75B6" opacity="0.08"/>
  <rect x="670" y="265" width="190" height="7" rx="0" fill="#fff"/>
  <text x="765" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2E75B6">Concentration</text>
  <text x="685" y="290" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">Where is knowledge</text>
  <text x="685" y="304" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">concentrated in one person?</text>
  <text x="685" y="324" font-family="Georgia, serif" font-size="9" fill="#888">Key-person risk mapping</text>

  <!-- Converge arrow -->
  <line x1="137" y1="338" x2="137" y2="365" stroke="#2E75B6" stroke-width="1" opacity="0.25"/>
  <line x1="347" y1="338" x2="347" y2="365" stroke="#2E75B6" stroke-width="1" opacity="0.25"/>
  <line x1="557" y1="338" x2="557" y2="365" stroke="#2E75B6" stroke-width="1" opacity="0.25"/>
  <line x1="765" y1="338" x2="765" y2="365" stroke="#2E75B6" stroke-width="1" opacity="0.25"/>
  <line x1="137" y1="365" x2="765" y2="365" stroke="#2E75B6" stroke-width="1" opacity="0.25"/>
  <line x1="450" y1="365" x2="450" y2="385" stroke="#2E75B6" stroke-width="1.5" opacity="0.4"/>
  <polygon points="444,382 450,392 456,382" fill="#2E75B6" opacity="0.4"/>

  <!-- WRS Output -->
