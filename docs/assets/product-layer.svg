<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <defs>
    <linearGradient id="bgPL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F0F2F5"/>
    </linearGradient>
    <linearGradient id="wrsBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D73A49"/>
      <stop offset="39%" stop-color="#D73A49"/>
      <stop offset="40%" stop-color="#B89B00"/>
      <stop offset="59%" stop-color="#B89B00"/>
      <stop offset="60%" stop-color="#4A90D9"/>
      <stop offset="74%" stop-color="#4A90D9"/>
      <stop offset="75%" stop-color="#2E75B6"/>
      <stop offset="89%" stop-color="#2E75B6"/>
      <stop offset="90%" stop-color="#0E8A16"/>
      <stop offset="100%" stop-color="#0E8A16"/>
    </linearGradient>
    <marker id="arwD" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#1A1A2E" opacity="0.4"/>
