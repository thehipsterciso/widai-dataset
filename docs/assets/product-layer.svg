  <rect x="40" y="126" width="152" height="6" rx="0" fill="#fff"/>
  <text x="116" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#1A1A2E">Phase 1: Scope</text>
  <text x="55" y="148" font-family="Georgia, serif" font-size="9" fill="#888">Days 1–5</text>
  <text x="55" y="162" font-family="Georgia, serif" font-size="9" fill="#555">Target team definition</text>
  <text x="55" y="174" font-family="Georgia, serif" font-size="9" fill="#555">Role mapping to WIDAI</text>

  <line x1="192" y1="145" x2="207" y2="145" stroke="#1A1A2E" stroke-width="1.5" marker-end="url(#arwD)"/>

  <rect x="212" y="110" width="152" height="70" rx="8" fill="#fff" stroke="#1A1A2E" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="212" y="110" width="152" height="22" rx="8" fill="#1A1A2E" opacity="0.06"/>
  <rect x="212" y="126" width="152" height="6" rx="0" fill="#fff"/>
  <text x="288" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#1A1A2E">Phase 2: Assess</text>
  <text x="227" y="148" font-family="Georgia, serif" font-size="9" fill="#888">Days 6–15</text>
  <text x="227" y="162" font-family="Georgia, serif" font-size="9" fill="#555">KSA gap measurement</text>
  <text x="227" y="174" font-family="Georgia, serif" font-size="9" fill="#555">4-dimension scoring</text>

  <line x1="364" y1="145" x2="379" y2="145" stroke="#1A1A2E" stroke-width="1.5" marker-end="url(#arwD)"/>

  <rect x="384" y="110" width="152" height="70" rx="8" fill="#fff" stroke="#1A1A2E" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="384" y="110" width="152" height="22" rx="8" fill="#1A1A2E" opacity="0.06"/>
  <rect x="384" y="126" width="152" height="6" rx="0" fill="#fff"/>
