  <text x="450" y="418" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1A1A2E">Workforce Readiness Score (WRS)</text>
  <text x="450" y="438" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#555">Composite 0–100 score with dimension breakdowns</text>

  <!-- WRS scale bar -->
  <rect x="100" y="465" width="700" height="14" rx="7" fill="url(#wrsBar)" opacity="0.7"/>
  <text x="100" y="494" font-family="Georgia, serif" font-size="9" fill="#D73A49" font-weight="bold">Critical</text>
  <text x="100" y="506" font-family="Georgia, serif" font-size="8" fill="#888">0–39</text>
  <text x="280" y="494" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#B89B00" font-weight="bold">At-Risk</text>
  <text x="280" y="506" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#888">40–59</text>
  <text x="450" y="494" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#4A90D9" font-weight="bold">Adequate</text>
  <text x="450" y="506" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#888">60–74</text>
  <text x="625" y="494" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2E75B6" font-weight="bold">Strong</text>
  <text x="625" y="506" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#888">75–89</text>
  <text x="780" y="494" font-family="Georgia, serif" font-size="9" fill="#0E8A16" font-weight="bold">Exceptional</text>
  <text x="780" y="506" font-family="Georgia, serif" font-size="8" fill="#888">90–100</text>

  <!-- Deliverables -->
  <line x1="60" y1="522" x2="840" y2="522" stroke="#1A1A2E" stroke-width="1" opacity="0.1"/>
  <text x="60" y="544" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#1A1A2E">Deliverables:</text>
  <rect x="145" y="532" width="130" height="18" rx="9" fill="#1A1A2E" opacity="0.06"/>
  <text x="210" y="544" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">Executive Summary</text>
  <rect x="285" y="532" width="115" height="18" rx="9" fill="#1A1A2E" opacity="0.06"/>
  <text x="342" y="544" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">Capability Map</text>
  <rect x="410" y="532" width="105" height="18" rx="9" fill="#1A1A2E" opacity="0.06"/>
  <text x="462" y="544" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">Gap Analysis</text>
  <rect x="525" y="532" width="140" height="18" rx="9" fill="#1A1A2E" opacity="0.06"/>
  <text x="595" y="544" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">Key Person Risk Map</text>
  <rect x="675" y="532" width="165" height="18" rx="9" fill="#1A1A2E" opacity="0.06"/>
  <text x="757" y="544" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#1A1A2E">Yr 1–3 Investment Model</text>

  <!-- Footer -->
