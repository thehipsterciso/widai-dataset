  <!-- Background -->
  <rect width="900" height="580" rx="12" fill="url(#bgPL)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">Product Application Layer</text>
  <text x="450" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#888">How WIDAI data becomes assessment products — PE Due Diligence as beachhead (ADR-002)</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PE ASSESSMENT FLOW -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="60" y="95" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1A1A2E">PE Workforce Due Diligence — 30-Day Engagement</text>
  <text x="820" y="95" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#888">R04 PE Assessment Methodology</text>

  <!-- Phase timeline -->
  <rect x="40" y="110" width="152" height="70" rx="8" fill="#fff" stroke="#1A1A2E" stroke-width="1" stroke-opacity="0.2"/>
