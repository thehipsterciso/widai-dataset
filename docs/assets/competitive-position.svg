  <rect width="900" height="380" rx="12" fill="url(#bg2)"/>
  <text x="450" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A2E">Where WIDAI Sits — And Where It Doesn't</text>
