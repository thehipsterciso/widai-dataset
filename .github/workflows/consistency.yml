name: ATLAS Consistency Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  consistency:
    name: Check dataset consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run ATLAS consistency check
        run: python scripts/check_consistency.py

      - name: Report results
        if: always()
        run: |
          echo "Consistency check completed. Review output above for any errors."
